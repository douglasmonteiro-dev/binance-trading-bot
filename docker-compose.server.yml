version: '3.7'

services:
  binance-bot:
    container_name: binance-bot
    image: chrisleekr/binance-trading-bot:latest
    networks:
      - internal
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - binance-redis
      - binance-mongo
    environment:
      # - BINANCE_MODE=test
      - BINANCE_MODE=live
      - BINANCE_REDIS_HOST=binance-redis
      - BINANCE_REDIS_PORT=6379
      - BINANCE_REDIS_PASSWORD=secretp422
      - BINANCE_MONGO_HOST=binance-mongo
      - BINANCE_MONGO_PORT=27017
      - BINANCE_LOG_LEVEL=INFO
      # Set to exact origin (e.g. https://yourdomain.com) to restrict CORS.
      # Leave empty or unset to block all cross-origin requests (recommended).
      - CORS_ALLOWED_ORIGIN=
    ports:
      - 8080:80
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'

  tradingview:
    container_name: tradingview
    image: chrisleekr/binance-trading-bot:tradingview
    networks:
      - internal
    restart: unless-stopped
    environment:
      # https://docs.python.org/3/howto/logging.html#logging-levels
      - BINANCE_TRADINGVIEW_LOG_LEVEL=INFO
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'

  binance-redis:
    container_name: binance-redis
    image: redis:6.2.4
    sysctls:
      net.core.somaxconn: 1024
    networks:
      - internal
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command:
      redis-server /usr/local/etc/redis/redis.conf --requirepass secretp422

  binance-mongo:
    container_name: binance-mongo
    image: mongo:3.2.20-jessie
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - mongo_data:/data/db
    environment:
      # MongoDB 3.2 uses MONGO_INITDB_ROOT_USERNAME/PASSWORD for auth.
      # Set MONGO_INITDB_ROOT_USERNAME and MONGO_INITDB_ROOT_PASSWORD via .env
      # and update BINANCE_MONGO_USERNAME / BINANCE_MONGO_PASSWORD accordingly.
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-}

networks:
  internal:
    driver: bridge
    # driver_opts:
    #     com.docker.network.driver.mtu: 1442

volumes:
  redis_data:
  mongo_data:
